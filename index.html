<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Health Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body{
    margin:0;
    padding:0;
    height:100%;
}
#map{
    width:100%;
    height:100vh;
}
</style>

</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([18.1424,100.1327],15);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
    attribution:'© OpenStreetMap',
    maxZoom:20
}).addTo(map);

fetch("HOME.txt")
.then(r=>r.text())
.then(text=>{

    const rows=text.trim().split("\n");

    const header=rows[0].split("|");

    const latIndex=header.indexOf("LATITUDE");
    const lonIndex=header.indexOf("LONGITUDE");
    const houseIndex=header.indexOf("HOUSE");
    const houseIdIndex=header.indexOf("HOUSE_ID");

    for(let i=1;i<rows.length;i++){

        const c=rows[i].split("|");

        const lat=parseFloat(c[latIndex]);
        const lon=parseFloat(c[lonIndex]);

        if(isNaN(lat)||isNaN(lon)) continue;

        L.marker([lat,lon])
        .addTo(map)
        .bindPopup(
            "<b>บ้านเลขที่ :</b> "+c[houseIndex]+"<br>"+
            "<b>HOUSE_ID :</b> "+c[houseIdIndex]
        );

    }

});

</script>

</body>
</html>
